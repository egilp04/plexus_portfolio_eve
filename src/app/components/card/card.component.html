<mat-card class="project-card" appZooomCambioColor appearance="outlined">
  <mat-card-header>
    <mat-card-title>{{ project.title }}</mat-card-title>
    <mat-card-subtitle>{{ project.subtitle | translate }}</mat-card-subtitle>
  </mat-card-header>
  <img mat-card-image [src]="project.image" [alt]="project.title" />
  <mat-card-content>
    <p>{{ project.description | translate }}</p>
    <div class="tech-section">
      <p class="tech-title">
        {{ "PAGES.PROJECTS.CARDS.TECHNOLOGIES" | translate }}:
      </p>
      <div class="tech-tags">
        @for (tech of project.technologies; track tech) {
          <span class="tech-tag">{{ tech }}</span>
        }
      </div>
    </div>
  </mat-card-content>
  <mat-card-actions class="card-actions">
    @if (userService.userSesion()) {
      <a
        mat-button
        [href]="project.url"
        target="_blank"
        rel="noopener noreferrer"
      >
        <img src="assets/icons/github.png" alt="GitHub" class="img-url" />
      </a>
    }
  </mat-card-actions>
</mat-card>
