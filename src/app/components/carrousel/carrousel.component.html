<div class="tech-marquee-container">
  <div class="marquee-track">
    @for (tech of this.data; track $index) {
      <div class="tech-item">
        <img [src]="tech.icon" [alt]="tech.name" [matTooltip]="tech.name" />
      </div>
    }

    @for (tech of this.data; track $index) {
      <div class="tech-item" aria-hidden="true">
        <img [src]="tech.icon" [alt]="tech.name" [matTooltip]="tech.name" />
      </div>
    }
  </div>
</div>
