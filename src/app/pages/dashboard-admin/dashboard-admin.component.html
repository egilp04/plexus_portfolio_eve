<h1>{{ "PAGES.DASHBOARD_ADMIN.TITLE" | translate }}</h1>
@if (loaderService.loading$ | async) {
  <div class="cargando-estadisticas">
    <mat-spinner diameter="50"></mat-spinner>
    <p>{{ "PAGES.DASHBOARD_ADMIN.CHARGING" | translate }}</p>
  </div>
} @else {
  <section class="estadisticas">
    <section class="chart-section chart-trigger">
      <app-bar-char
        title="Proyectos por Tipo"
        [labels]="typeLabels"
        [values]="typeValues"
        [colors]="['#b455a0', '#9c4dcc', '#7c4dff']"
      >
      </app-bar-char>
    </section>

    <section class="chart-section chart-trigger">
      <app-bar-char
        title="Proyectos por Empresa"
        [labels]="companyLabels"
        [values]="companyValues"
        [colors]="['#ff9800', '#ffc107', '#ffeb3b', '#cddc39']"
      >
      </app-bar-char>
    </section>

    <section class="chart-section chart-trigger">
      <app-bar-char
        title="Top Tecnologías Utilizadas"
        [labels]="techLabels"
        [values]="techValues"
        [colors]="[
          '#26a69a',
          '#4db6ac',
          '#80cbc4',
          '#b2dfdb',
          '#00897b',
          '#00695c',
        ]"
      >
      </app-bar-char>
    </section>
  </section>
}
