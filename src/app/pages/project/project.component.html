<h1>{{ "PAGES.PROJECTS.TITLE" | translate }}</h1>
<section class="projects-container">
  <div class="projects-grid">
    @for (item of projectsList; track item.id) {
      <div #projectCard>
        <app-card [project]="item"></app-card>
      </div>
    } @empty {
      <p>Cargando proyectos...</p>
    }
  </div>
</section>
